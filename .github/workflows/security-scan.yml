name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  strix-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Strix
        run: curl -sSL https://strix.ai/install | bash

      - name: Run Strix
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: strix -n -t ./ --scan-mode quick

      - name: Enviar email em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ Orrin CRM — Strix encontrou vulnerabilidades"
          to: batttista@gmail.com
          from: Orrin Security <${{ secrets.MAIL_USERNAME }}>
          body: |
            O scan Strix encontrou vulnerabilidades no código do Orrin CRM.

            Acesse os logs da execução:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

  zap-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Pula se os secrets de staging não estiverem configurados
    if: ${{ secrets.STAGING_SUPABASE_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Seed ZAP test user
        working-directory: backend
        run: node ../.zap/seed-zap-user.mjs
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start backend
        run: |
          cd backend && node dist/index.js &
          npm install -g wait-on
          wait-on http://localhost:3001/api/health --timeout 60000
        env:
          PORT: 3001
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.STAGING_ANTHROPIC_API_KEY }}

      - name: ZAP Full Scan (autenticado)
        id: zap
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:3001/api'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-z "-configfile /zap/wrk/.zap/orrin-context.yaml"'
          fail_action: false   # não quebra o job, mas capturamos o resultado manualmente

      - name: Verificar resultado ZAP e enviar email
        if: always()
        run: |
          # ZAP gera report_html.html — verifica se tem alertas de risco médio ou alto
          if [ -f report_html.html ]; then
            HIGH=$(grep -c 'riskcode.*[23]' report_html.html 2>/dev/null || echo "0")
            echo "Alertas médio/alto encontrados: $HIGH"
            echo "ZAP_FINDINGS=$HIGH" >> $GITHUB_ENV
          else
            echo "ZAP_FINDINGS=0" >> $GITHUB_ENV
          fi

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

      - name: Enviar email se achar vulnerabilidades
        if: always() && env.ZAP_FINDINGS != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ Orrin CRM — ZAP encontrou ${{ env.ZAP_FINDINGS }} vulnerabilidade(s)"
          to: batttista@gmail.com
          from: Orrin Security <${{ secrets.MAIL_USERNAME }}>
          body: |
            O scan ZAP encontrou ${{ env.ZAP_FINDINGS }} alerta(s) de risco médio ou alto na API do Orrin CRM.

            Acesse o relatório completo (artifact "zap-report"):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
